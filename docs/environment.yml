name: mlgeo-methane-seeps
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python>=3.8
  
  # Core Scientific Computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  
  # Seismic Data Processing
  - obspy>=1.3.0
  
  # NetCDF File Handling
  - netcdf4>=1.5.7
  - cftime>=1.5.0
  
  # Machine Learning - Traditional
  - scikit-learn>=1.0.0
  
  # Machine Learning - Deep Learning
  - pytorch>=1.10.0
  - torchvision>=0.11.0
  
  # Data Visualization
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  
  # Data Access and Web Services
  - requests>=2.26.0
  
  # Jupyter Notebook Support
  - jupyter>=1.0.0
  - ipykernel>=6.0.0
  - notebook>=6.4.0
  
  # Data Analysis Utilities
  - statsmodels>=0.13.0
  - tqdm>=4.62.0
  
  # Additional utilities via pip
  - pip
  - pip:
    - pickle5>=0.0.11
